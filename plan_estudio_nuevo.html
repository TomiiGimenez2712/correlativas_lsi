<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Lic. Sistemas de Información" />
    <meta property="og:description" content="Ver qué materias puedo cursar fácilmente!" />
    <meta property="og:url" content="https://1hagi.github.io/correlativas_lsi/" />
    <meta property="og:image" content="https://i.ibb.co/tbjM4pS/correlativas-lsi-banner.png" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Lic. en Sistemas - Correlativas" />

    <title>LSI Correlativas - Nuevo Plan</title>
    <link rel="stylesheet" type="text/css" href="./css/reset.css">
    <link rel="stylesheet" type="text/css" href="./css/styles.css">
    <link rel="shortcut icon" href="./img/favicon_degree.png" />

    <script defer src="./js/Subject.js"></script>
    <script defer src="./js/load_subjects_pen.js"></script>
    <script defer src="./js/onload.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

    <header>
        <div class="header-content">
            <img src="./img/unne_black_logo.png" alt="Logo" class="header-logo">
            <div class="header-title">
                <h1>Plan de Lic. en Sistemas</h1>
                <h2>Correlativas - Plan 2023</h2>
            </div>
            <div class="header-actions">
                <button id="theme-toggle-btn" onclick="toggleTheme()" aria-label="Cambiar tema">
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                </button>
                <a href="index.html" class="back-to-index-btn" aria-label="Volver">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                </a>
            </div>
        </div>
        
    </header>
    <div class="clear-btn">
        <button class="clear-selection-btn" onclick="limpiarSeleccion()">Limpiar selección</button>
    </div>

    <main id="main-content">
        </main>

    <footer>
        <div class="all-progress-bars">
            <div class="progress-container">
                <p class="progress-title">Analista Programador/a</p>
                <div class="progress-bar-wrapper">
                    <div id="analista_progress_bar" class="progress-bar-fill"></div>
                </div>
                <p id="analista_progress_text" class="progress-percentage">0.0 %</p>
            </div>
            <div class="progress-container">
                <p class="progress-title">Licenciado/a en Sistemas</p>
                <div class="progress-bar-wrapper">
                    <div id="main_progress_bar" class="progress-bar-fill"></div>
                </div>
                <p id="main_progress_text" class="progress-percentage">0.0 %</p>
            </div>
        </div>
        <div class="footer-credits">
            <p>© 2025 Todos los derechos reservados <br>
                Tomás Giménez</p>
            <a href="https://github.com/tomiigimenez2712" target="_blank">
                <img class="github_img" src="./img/github.png" alt="Github">
            </a>
        </div>
    </footer>

    <div id="subject-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="modal-close-btn" onclick="closeModal()">&times;</button>
            <h3 id="modal-title">Nombre de la Materia</h3>
            <div id="modal-body">
                </div>
        </div>
    </div>

    <script defer src="./js/theme.js"></script>
</body>
</html>
